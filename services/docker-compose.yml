version: "3.9"

services:
  vlam-host:
    build: ./host
    ports:
      - "8000:8000"
    env_file:
      - ./host/.env
    volumes:
      - ./mcp:/app/../mcp:ro
    depends_on:
      - kvk
      - koop
      - regelrecht
      - rvo

  kvk:
    build: ./mcp/kvk
    # MCP-servers communiceren via stdio, niet via netwerk
    # Ze worden als subprocess gestart door de host

  koop:
    build: ./mcp/koop

  regelrecht:
    build: ./mcp/regelrecht

  rvo:
    build: ./mcp/rvo
